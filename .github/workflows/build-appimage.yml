name: Build Twister AppImage

on:
  push:
    branches: [master, TauriGUI]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libsoup2.4-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev \
            libdbus-1-dev \
            pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            twister/src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('twister/src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: twister/package-lock.json

      - name: Install frontend dependencies
        working-directory: twister
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Twister AppImage
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: twister
          args: --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: twister-appimage-${{ github.sha }}
          path: twister/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: twister/src-tauri/target/release/bundle/appimage/*.AppImage
          draft: true
          generate_release_notes: true
